on:
    pull_request:
    push:
        branches: [main]

jobs:
    test:
        name: Test
        runs-on: ubuntu-latest
        permissions:
            id-token: "write"
            contents: "read"
        steps:
            - uses: actions/checkout@v4
            - uses: cachix/install-nix-action@v30
            - uses: cachix/cachix-action@v15
              with:
                  name: devenv
            - name: Install devenv
              run: nix profile install nixpkgs#devenv
            - name: Test
              run: devenv test
